<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="AgentDuel animated mark — red and cyan blades draw in and clash over a gold coin-ball; a spark bursts">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B0A10"/><stop offset="0.55" stop-color="#141008"/><stop offset="1" stop-color="#120609"/>
    </linearGradient>
    <linearGradient id="bladeRed" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#B3122E"/><stop offset="1" stop-color="#FF3D5A"/>
    </linearGradient>
    <linearGradient id="bladeCyan" x1="1" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#0E7F96"/><stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="coin" cx="0.42" cy="0.36" r="0.72">
      <stop offset="0" stop-color="#FFD166"/><stop offset="0.6" stop-color="#FFB300"/><stop offset="1" stop-color="#8a5f00"/>
    </radialGradient>
    <linearGradient id="strip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFB300" stop-opacity="0"/><stop offset="0.5" stop-color="#FFB300" stop-opacity="0.45"/><stop offset="1" stop-color="#FFB300" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff"/><stop offset="0.5" stop-color="#FFD166"/><stop offset="1" stop-color="#FFB300" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-70%" y="-70%" width="240%" height="240%"><feGaussianBlur stdDeviation="15"/></filter>
    <clipPath id="badge"><rect x="24" y="24" width="464" height="464" rx="112"/></clipPath>
    <style>
      @keyframes breathe { 0%,100%{opacity:.22} 82%{opacity:.58} }
      @keyframes twinkle { 0%,100%{opacity:.25} 50%{opacity:.9} }
      @keyframes stripdrift { 0%,100%{opacity:.32} 50%{opacity:.75} }
      @keyframes coinpop { 0%,6%{transform:scale(.92)} 14%{transform:scale(1.05)} 20%,100%{transform:scale(1)} }
      .breath{animation:breathe 6s ease-in-out infinite}
      .tw{animation:twinkle 6s ease-in-out infinite}
      .strip{animation:stripdrift 6s ease-in-out infinite}
      .coin{animation:coinpop 6s cubic-bezier(.2,1.4,.4,1) infinite;transform-box:fill-box;transform-origin:center}
      @media (prefers-reduced-motion: reduce){*{animation:none !important}}
    </style>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="112" fill="url(#bg)"/>
  <g clip-path="url(#badge)">
    <g transform="rotate(-35 256 256)">
      <rect class="strip" x="-120" y="150" width="380" height="3" fill="#FF3D5A"/>
      <rect class="strip" x="-120" y="360" width="420" height="3" fill="#FF3D5A" style="animation-delay:-3s"/>
    </g>
    <g transform="rotate(35 256 256)">
      <rect class="strip" x="252" y="150" width="380" height="3" fill="#22D3EE" style="animation-delay:-1.5s"/>
      <rect class="strip" x="212" y="360" width="420" height="3" fill="#22D3EE" style="animation-delay:-4.5s"/>
    </g>
    <g transform="rotate(-35 256 256)"><rect class="strip" x="-120" y="255" width="760" height="2.5" fill="url(#strip)" style="animation-delay:-2s"/></g>
    <g fill="#fff3dd">
      <circle class="tw" cx="104" cy="100" r="2.4"/><circle class="tw" cx="414" cy="118" r="1.8" style="animation-delay:-2s"/>
      <circle class="tw" cx="372" cy="70" r="1.5" style="animation-delay:-1s"/><circle class="tw" cx="92" cy="190" r="1.5" style="animation-delay:-3s"/>
    </g>
  </g>

  <!-- glow-breath duplicate of the coin -->
  <g class="breath" filter="url(#soft)">
    <circle cx="256" cy="286" r="86" fill="#FFB300"/>
  </g>

  <!-- coin-ball pops in early -->
  <g class="coin" filter="url(#glow)">
    <circle cx="256" cy="286" r="86" fill="url(#coin)" stroke="#5b3f00" stroke-width="4"/>
    <path d="M256 236 L303.5 270.5 L285.4 326.4 L226.6 326.4 L208.5 270.5 Z" fill="none" stroke="#5b3f00" stroke-width="6" stroke-linejoin="round" opacity="0.85"/>
    <circle cx="256" cy="286" r="86" fill="none" stroke="#FFD166" stroke-width="3" opacity="0.7"/>
  </g>

  <!-- blades draw in from opposite corners (seam-safe) -->
  <g stroke-linecap="round" filter="url(#glow)">
    <path d="M132 402 L336 158" stroke="url(#bladeRed)" stroke-width="34" pathLength="100" stroke-dasharray="100">
      <animate attributeName="stroke-dashoffset" values="100;100;0;0;0" keyTimes="0;0.16;0.4;0.94;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.18;0.4;0.94;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M380 402 L176 158" stroke="url(#bladeCyan)" stroke-width="34" pathLength="100" stroke-dasharray="100">
      <animate attributeName="stroke-dashoffset" values="100;100;0;0;0" keyTimes="0;0.22;0.46;0.94;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;1;0" keyTimes="0;0.24;0.46;0.94;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M112 380 L166 424" stroke="#FF3D5A" stroke-width="16" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.38;0.42;0.94;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <path d="M400 380 L346 424" stroke="#22D3EE" stroke-width="16" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.44;0.48;0.94;1" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- clash spark: bursts when both blades land -->
  <g filter="url(#glow)">
    <path d="M256 168 L266 208 L306 218 L266 228 L256 268 L246 228 L206 218 L246 208 Z" fill="#FFD166" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.48;0.54;0.92;1" dur="6s" repeatCount="indefinite"/>
    </path>
    <circle cx="256" cy="218" r="12" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.48;0.54;0.92;1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="218" r="10" fill="none" stroke="#FFD166" stroke-width="3">
      <animate attributeName="r" values="8;8;60;60" keyTimes="0;0.5;0.68;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0;0.85;0;0" keyTimes="0;0.5;0.54;0.7;1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="256" cy="218" r="26" fill="url(#spark)" opacity="0">
      <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.48;0.54;0.66;1" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
