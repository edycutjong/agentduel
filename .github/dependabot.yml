version: 2
updates:
  # Root package — arena/settle logic + x402 API (@injectivelabs/x402, express, viem)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  # Web package — the judge-facing Next.js arena page (own lockfile)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
  # GitHub Actions used by the CI/CD pipeline
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
